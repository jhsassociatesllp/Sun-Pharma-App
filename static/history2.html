<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#1a3a2a"/>
  <title>History — Tree Plantation</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <!-- SheetJS -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--forest:#1a3a2a;--green:#2d6a4f;--leaf:#52b788;--mint:#95d5b2;--pale:#d8f3dc;--cream:#f8f6f1;--dark:#111827;--grey:#6b7280;--border:#e5e7eb;--amber:#f59e0b}
    html,body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh}

    nav{background:var(--forest);height:56px;display:flex;align-items:center;padding:0 1.25rem;gap:.6rem;position:sticky;top:0;z-index:100}
    .nav-logo{font-family:'Fraunces',serif;color:#fff;font-size:1.05rem;text-decoration:none;flex-shrink:0}
    .nav-logo span{color:var(--mint)}
    .nav-page-toggle{display:flex;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:100px;padding:3px;gap:2px;margin-left:.25rem}
    .nav-page-btn{padding:4px 13px;border:none;background:none;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;color:rgba(255,255,255,.5);cursor:pointer;transition:all .18s;white-space:nowrap;text-decoration:none;display:flex;align-items:center}
    .nav-page-btn.active{background:rgba(149,213,178,.22);color:#fff}
    .nav-page-btn:hover:not(.active){background:rgba(149,213,178,.12);color:var(--mint)}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:.45rem}

    .user-menu-wrap{position:relative}
    .user-icon-btn{width:34px;height:34px;border-radius:50%;background:rgba(149,213,178,.15);border:1.5px solid rgba(149,213,178,.3);color:var(--mint);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .18s;flex-shrink:0}
    .user-icon-btn:hover{background:rgba(149,213,178,.28)}
    .user-icon-btn svg{width:17px;height:17px}
    .user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border:1.5px solid var(--border);border-radius:14px;min-width:200px;box-shadow:0 8px 28px rgba(0,0,0,.13);z-index:300;overflow:hidden;opacity:0;transform:translateY(-6px) scale(.97);pointer-events:none;transition:opacity .18s,transform .18s;transform-origin:top right}
    .user-dropdown.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
    .dropdown-header{padding:.85rem 1.05rem .6rem;border-bottom:1px solid var(--border)}
    .dropdown-name{font-weight:700;font-size:.9rem;color:var(--dark)}
    .dropdown-role{font-size:.72rem;color:var(--grey);margin-top:1px}
    .dropdown-item{display:flex;align-items:center;gap:.6rem;padding:.7rem 1.05rem;font-size:.85rem;font-weight:500;color:var(--dark);cursor:pointer;transition:background .15s;text-decoration:none;border:none;background:none;width:100%;font-family:'DM Sans',sans-serif}
    .dropdown-item:hover{background:var(--pale);color:var(--green)}
    .dropdown-item svg{width:15px;height:15px;color:var(--grey)}
    .dropdown-item:hover svg{color:var(--green)}
    .dropdown-item.danger{color:#ef4444}.dropdown-item.danger:hover{background:#fef2f2}
    .dropdown-item.danger svg{color:#ef4444}
    .dropdown-divider{height:1px;background:var(--border);margin:.2rem 0}

    .main{max-width:820px;margin:0 auto;padding:2rem 1.5rem 4rem}
    .page-hdr{margin-bottom:1.75rem}
    .page-hdr h1{font-family:'Fraunces',serif;font-size:1.55rem;color:var(--forest)}
    .page-hdr p{color:var(--grey);font-size:.85rem;margin-top:.3rem}

    /* loading/empty */
    .loading{text-align:center;padding:4rem 1rem;color:var(--grey)}
    @keyframes rot{to{transform:rotate(360deg)}}.rot{animation:rot .8s linear infinite}
    .empty{text-align:center;padding:4rem 1rem}
    .empty svg{width:48px;height:48px;margin:0 auto 1rem;display:block;opacity:.2}
    .empty h3{font-family:'Fraunces',serif;font-size:1.1rem;color:var(--dark);margin-bottom:.4rem}
    .empty p{color:var(--grey);font-size:.88rem}
    .empty a{color:var(--green);font-weight:600;text-decoration:none}

    /* submission card */
    .sub-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;margin-bottom:1.1rem;overflow:hidden;transition:box-shadow .2s}
    .sub-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}

    .sub-hdr{padding:1.1rem 1.25rem;cursor:pointer;display:flex;align-items:flex-start;gap:.9rem;user-select:none}
    .sub-num{width:34px;height:34px;border-radius:9px;background:var(--pale);display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-size:.95rem;font-weight:700;color:var(--green);flex-shrink:0;margin-top:1px}
    .sub-meta{flex:1;min-width:0}
    .sub-title{font-weight:700;font-size:.93rem;color:var(--dark)}
    .sub-date{font-size:.75rem;color:var(--grey);margin-top:2px}
    .sub-sec-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-top:.6rem}
    .sub-sec-tag{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:100px;background:var(--pale);color:var(--green);white-space:nowrap}
    .sub-right{display:flex;align-items:flex-start;gap:.45rem;flex-shrink:0;padding-top:2px;flex-direction:column;align-items:flex-end}
    .synced-badge{font-size:.7rem;font-weight:600;padding:4px 10px;border-radius:100px;background:#dcfce7;color:#16a34a;white-space:nowrap}
    .card-export-btn{display:flex;align-items:center;gap:4px;background:var(--pale);color:var(--green);border:none;padding:5px 10px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;transition:background .15s;white-space:nowrap}
    .card-export-btn:hover{background:#c3e6c9}
    .card-export-btn svg{width:12px;height:12px}
    .sub-chevron{color:var(--grey);transition:transform .25s;flex-shrink:0;margin-top:4px}
    .sub-chevron svg{width:18px;height:18px;display:block}

    .sub-body{display:none;border-top:1.5px solid var(--border)}
    .sub-card.open .sub-body{display:block}
    .sub-card.open .sub-chevron{transform:rotate(180deg)}

    /* section accordion */
    .sec-acc{border-bottom:1px solid var(--border)}
    .sec-acc:last-child{border-bottom:none}
    .sec-acc-hdr{display:flex;align-items:center;gap:.7rem;padding:.85rem 1.25rem;cursor:pointer;user-select:none;background:#fff;transition:background .15s}
    .sec-acc-hdr:hover{background:#f9fafb}
    .sec-acc-icon{font-size:1rem;flex-shrink:0;width:22px;text-align:center}
    .sec-acc-name{font-weight:700;font-size:.86rem;color:var(--dark);flex:1}
    .sec-acc-chevron{color:var(--grey);transition:transform .22s;flex-shrink:0}
    .sec-acc-chevron svg{width:15px;height:15px;display:block}
    .sec-acc.open .sec-acc-hdr{background:#f0fdf4}
    .sec-acc.open .sec-acc-chevron{transform:rotate(180deg)}
    .sec-acc-body{display:none;padding:.75rem 1.25rem 1.1rem;background:#fafffe;border-top:1px solid #e6f7ee}
    .sec-acc.open .sec-acc-body{display:block}

    .field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(195px,1fr));gap:.5rem}
    .field-item{background:#fff;border:1px solid var(--border);border-radius:8px;padding:.55rem .8rem}
    .field-key{font-size:.67rem;color:var(--grey);margin-bottom:2px;line-height:1.3;text-transform:uppercase;letter-spacing:.03em}
    .field-val{font-size:.84rem;color:var(--dark);font-weight:500;line-height:1.4}
    .field-val.na{color:#c4c9d4;font-style:italic;font-weight:400}

    /* toast */
    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:10px 18px;border-radius:100px;font-size:.84rem;font-weight:500;white-space:nowrap;opacity:0;transition:opacity .28s;pointer-events:none;z-index:999;display:flex;align-items:center;gap:7px}
    .toast svg{width:14px;height:14px}
    .toast.show{opacity:1}

    @media(max-width:640px){
      .main{padding:1.25rem 1rem 3rem}
      nav{padding:0 1rem}
      .field-grid{grid-template-columns:1fr 1fr}
      .sub-right{flex-direction:row;align-items:center}
    }
  </style>
</head>
<body>
<nav>
  <a href="/dashboard.html" class="nav-logo">🌳 Tree<span>App</span></a>
  <div class="nav-page-toggle">
    <a href="/dashboard.html" class="nav-page-btn">Home</a>
    <a href="/history.html"   class="nav-page-btn active">History</a>
  </div>
  <div class="nav-right">
    <div class="user-menu-wrap" id="user-menu-wrap">
      <button class="user-icon-btn" onclick="toggleUserMenu()" title="Account">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </button>
      <div class="user-dropdown" id="user-dropdown">
        <div class="dropdown-header">
          <div class="dropdown-name" id="dropdown-name">…</div>
          <div class="dropdown-role" id="dropdown-role">Field Employee</div>
        </div>
        <button class="dropdown-item danger" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
          Sign out
        </button>
      </div>
    </div>
  </div>
</nav>

<main class="main">
  <div class="page-hdr">
    <h1>Submission History</h1>
    <p>One card per submitted day · Expand to view · Export individual submissions to Excel</p>
  </div>
  <div id="content">
    <div class="loading">
      <svg class="rot" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
      </svg>
      <p style="margin-top:.75rem">Loading history…</p>
    </div>
  </div>
</main>

<div class="toast" id="toast">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toast-msg"></span>
</div>

<script>
const SEC_META = {
  A:{icon:'👤',name:'Respondent Profile'},B:{icon:'🌱',name:'Sapling Quality'},
  C:{icon:'📦',name:'Sapling Distribution'},D:{icon:'🪴',name:'Plantation Process'},
  E:{icon:'📊',name:'Survival & Maintenance'},F:{icon:'🎓',name:'Capacity Building'},
  G:{icon:'🏕️',name:'Field Support'},H:{icon:'🔍',name:'Duplication Check'},
  I:{icon:'💰',name:'Outcome & Impact'},J:{icon:'🧧',name:'Branding & Visibility'},
  K:{icon:'⭐',name:'Farmer Feedback'},
};
const F_LABELS = {
  name:'Beneficiary Name',age:'Age',gender:'Gender',mobile:'Mobile',marital:'Marital Status',
  location:'Location',landsize:'Landholding Size',landown:'Land Ownership',irrigation:'Irrigation Access',
  times_received:'Times Received Saplings',sapling_cond:'Sapling Condition',sapling_age:'Appropriate Height/Age',
  sapling_suit:'Suitable for Soil/Climate',mis_match:'Received as per MIS',sup_papaya:'Supposed – Papaya',
  sup_mulberry:'Supposed – Mulberry',sup_banana:'Supposed – Banana',rcv_papaya:'Received – Papaya',
  rcv_mulberry:'Received – Mulberry',rcv_banana:'Received – Banana',approved_land:'Planted on Approved Land',
  plant_season:'Recommended Season',pit_size:'Pit Size & Spacing',manure:'Manure Applied',
  surv_papaya:'Surviving – Papaya',surv_mulberry:'Surviving – Mulberry',surv_banana:'Surviving – Banana',
  watering:'Watering Frequency',weeding:'Weeding Frequency',training:'Attended Training',
  train_date:'Training Date',train_loc:'Training Location',train_help:'Training Helped',
  team_visit:'Field Team Visit',num_visits:'No. of Visits',tech_guidance:'Technical Guidance',
  know_contact:'Knew Whom to Contact',resolved:'Concerns Resolved',other_csr:'Another CSR Program',
  csr_partner:'CSR Partner',govt_scheme:'Govt Scheme',scheme_name:'Scheme Name',
  profit_cy:'Income – Current Year',profit_ly:'Income – Last Year',csr_informed:'Informed of CSR Support',
  branding:'Branding Material Seen',satisfaction:'Overall Satisfaction',suggestions:'Suggestions',
  recommend:'Would Recommend',
};
const CHK_LABELS = {
  A:['Irrigation Source'],D:['Manure Type','Protective Measures','Photos Taken'],
  E:['Mortality Reasons'],F:['Topics Covered'],I:['Income Factors'],K:['Helpful Aspects','Challenges Faced'],
};

// Auth
const user = JSON.parse(localStorage.getItem('user') || 'null');
if (!user) { window.location.href = '/'; throw 0; }
document.getElementById('dropdown-name').textContent = user.name || '…';
document.getElementById('dropdown-role').textContent = user.is_admin ? 'Admin · Field Employee' : 'Field Employee';

function fmtDate(dateStr) {
  if (!dateStr) return '—';
  const [y,m,d] = dateStr.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const days   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const dt = new Date(+y, +m-1, +d);
  return `${days[dt.getDay()]}, ${d} ${months[+m-1]} ${y}`;
}

function renderVal(val) {
  if (val === undefined || val === null || val === '') return '<span class="field-val na">—</span>';
  if (Array.isArray(val)) return val.length === 0
    ? '<span class="field-val na">None selected</span>'
    : `<span class="field-val">${val.join(', ')}</span>`;
  return `<span class="field-val">${val}</span>`;
}

function buildFieldGrid(secId, data) {
  if (!data) return '<p style="color:var(--grey);font-size:.83rem">No data.</p>';
  const chkLabels = CHK_LABELS[secId] || [];
  const items = [];
  Object.entries(data).forEach(([key, val]) => {
    const label = key.startsWith('chk_')
      ? (chkLabels[parseInt(key.split('_')[1])] || `Multi-select ${+key.split('_')[1]+1}`)
      : (F_LABELS[key] || key.replace(/_/g,' '));
    items.push(`<div class="field-item"><div class="field-key">${label}</div>${renderVal(val)}</div>`);
  });
  return `<div class="field-grid">${items.join('')}</div>`;
}

function buildSectionAcc(docId, secId, data) {
  const m = SEC_META[secId]; if (!m) return '';
  const id = `acc-${docId}-${secId}`;
  return `<div class="sec-acc" id="${id}">
    <div class="sec-acc-hdr" onclick="toggleSec('${id}')">
      <span class="sec-acc-icon">${m.icon}</span>
      <span class="sec-acc-name">Section ${secId}: ${m.name}</span>
      <span class="sec-acc-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></span>
    </div>
    <div class="sec-acc-body">${buildFieldGrid(secId, data)}</div>
  </div>`;
}

// ── Excel export for a single card ──────────────────────────
function flattenSection(secId, data, meta) {
  const row = { ...meta };
  if (!data) return row;
  const chkLabels = CHK_LABELS[secId] || [];
  Object.entries(data).forEach(([key, val]) => {
    const label = key.startsWith('chk_')
      ? (chkLabels[parseInt(key.split('_')[1])] || `Multi-select ${+key.split('_')[1]+1}`)
      : (F_LABELS[key] || key);
    row[label] = Array.isArray(val) ? val.join(', ') : (val ?? '');
  });
  return row;
}

function exportCard(doc) {
  const wb   = XLSX.utils.book_new();
  const meta = { 'Employee Name': doc.employee_name || user.name || '', 'Date': doc.date || '' };
  const sections = doc.sections || {};
  const secIds   = Object.keys(sections).sort();

  if (!secIds.length) { toast('No data to export'); return; }

  secIds.forEach(secId => {
    const m = SEC_META[secId];
    const sheetName = `${secId} - ${m ? m.name : secId}`.slice(0, 31);
    const row = flattenSection(secId, sections[secId], meta);
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet([row]), sheetName);
  });

  const name = (doc.employee_name || user.name || 'Employee').replace(/\s+/g,'_');
  XLSX.writeFile(wb, `TreeApp_${name}_${doc.date}.xlsx`);
  toast('Excel exported ✓');
}

// Store docs globally for export access
let allDocs = [];

function buildCard(doc, idx) {
  const sections = doc.sections || {};
  const secIds   = Object.keys(sections).sort();
  const name     = sections.A?.name || '—';
  const location = sections.A?.location || '';
  const displayDate = doc.date ? fmtDate(doc.date) : '—';
  const secCount    = secIds.length;

  const tagHtml = secIds.map(id => {
    const m = SEC_META[id];
    return m ? `<span class="sub-sec-tag">${m.icon} ${m.name}</span>` : '';
  }).join('');

  const accs = secIds.map(id => buildSectionAcc(idx, id, sections[id])).join('');
  const cid  = `card-${idx}`;

  return `<div class="sub-card" id="${cid}">
    <div class="sub-hdr" onclick="toggleCard('${cid}')">
      <div class="sub-num">${idx}</div>
      <div class="sub-meta">
        <div class="sub-title">${name}${location?' · '+location:''}</div>
        <div class="sub-date">📅 ${displayDate} &nbsp;·&nbsp; ${secCount}/11 sections</div>
        <div class="sub-sec-tags">${tagHtml}</div>
      </div>
      <div class="sub-right">
        <span class="synced-badge">✓ Submitted</span>
        <button class="card-export-btn" onclick="event.stopPropagation(); exportCard(allDocs[${idx-1}])">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Export
        </button>
        <span class="sub-chevron" id="chev-${cid}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></span>
      </div>
    </div>
    <div class="sub-body" id="body-${cid}">${accs}</div>
  </div>`;
}

function toggleCard(cid) {
  const card = document.getElementById(cid);
  const body = document.getElementById('body-'+cid);
  const chev = document.getElementById('chev-'+cid);
  if (!card||!body) return;
  const opening = !card.classList.contains('open');
  card.classList.toggle('open', opening);
  body.style.display = opening ? 'block' : 'none';
  if (chev) chev.style.transform = opening ? 'rotate(180deg)' : '';
}

function toggleSec(id) {
  document.getElementById(id)?.classList.toggle('open');
}

async function load() {
  const el    = document.getElementById('content');
  const token = localStorage.getItem('access_token');

  if (!navigator.onLine) { el.innerHTML = offlineHtml(); return; }
  if (!token)            { el.innerHTML = emptyHtml();   return; }

  try {
    const res  = await fetch('/api/submissions', { headers:{'Authorization':'Bearer '+token} });
    if (!res.ok) throw new Error();
    const docs = await res.json();
    allDocs = docs;

    if (!docs.length) {
      el.innerHTML = emptyHtml();
    } else {
      el.innerHTML = docs.map((d, i) => buildCard(d, i+1)).join('');
    }
  } catch {
    el.innerHTML = offlineHtml();
  }
}

const emptyHtml   = () => `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><h3>No submissions yet</h3><p>Fill sections on the <a href="/dashboard.html">Home page</a> and click <strong>Submit Day</strong>.</p></div>`;
const offlineHtml = () => `<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg><h3>You're offline</h3><p>History will appear when you're back online.</p></div>`;

function toast(msg, dur=2800) {
  const t = document.getElementById('toast');
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

function toggleUserMenu() {
  document.getElementById('user-dropdown').classList.toggle('open');
}
document.addEventListener('click', e => {
  const wrap = document.getElementById('user-menu-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('user-dropdown').classList.remove('open');
  }
});

function logout() {
  ['access_token','refresh_token','user'].forEach(k => localStorage.removeItem(k));
  window.location.href = '/';
}

load();
</script>
</body>
</html>
