<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <meta name="theme-color" content="#0f1525"/>
  <title>History — JHS Tree Plantation</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--navy:#0f1525;--navy2:#1a2240;--navy3:#243060;--gold:#c9a84c;--gold2:#e2c97e;--goldp:rgba(201,168,76,.12);--goldpd:rgba(201,168,76,.06);--cream:#f5f3ee;--dark:#111827;--grey:#6b7280;--border:#e5e7eb}
    html,body{font-family:'DM Sans',sans-serif;background:var(--cream);min-height:100vh}
    nav{background:var(--navy);height:58px;display:flex;align-items:center;padding:0 1.25rem;gap:.6rem;position:sticky;top:0;z-index:100;border-bottom:1px solid rgba(201,168,76,.1)}
    .nav-logo{font-family:'Playfair Display',serif;color:#fff;font-size:1.05rem;text-decoration:none;flex-shrink:0;display:flex;align-items:center;gap:.5rem}
    .nav-logo .logo-jhs{color:var(--gold);font-weight:700}
    .nav-page-toggle{display:flex;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:100px;padding:3px;gap:2px;margin-left:.25rem}
    .nav-page-btn{padding:4px 13px;border:none;background:none;border-radius:100px;font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;color:rgba(255,255,255,.45);cursor:pointer;transition:all .18s;white-space:nowrap;text-decoration:none;display:flex;align-items:center}
    .nav-page-btn.active{background:rgba(201,168,76,.18);color:var(--gold2)}
    .nav-page-btn:hover:not(.active){background:rgba(201,168,76,.1);color:var(--gold)}
    .nav-right{margin-left:auto;display:flex;align-items:center;gap:.45rem}
    .user-menu-wrap{position:relative}
    .user-icon-btn{width:34px;height:34px;border-radius:50%;background:rgba(201,168,76,.1);border:1.5px solid rgba(201,168,76,.25);color:var(--gold);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .18s}
    .user-icon-btn:hover{background:rgba(201,168,76,.2)}
    .user-icon-btn svg{width:17px;height:17px}
    .user-dropdown{position:absolute;top:calc(100% + 8px);right:0;background:#fff;border:1.5px solid var(--border);border-radius:14px;min-width:200px;box-shadow:0 8px 28px rgba(0,0,0,.13);z-index:300;overflow:hidden;opacity:0;transform:translateY(-6px) scale(.97);pointer-events:none;transition:opacity .18s,transform .18s;transform-origin:top right}
    .user-dropdown.open{opacity:1;transform:translateY(0) scale(1);pointer-events:all}
    .dropdown-header{padding:.85rem 1.05rem .6rem;border-bottom:1px solid var(--border)}
    .dropdown-name{font-weight:700;font-size:.9rem;color:var(--dark)}
    .dropdown-role{font-size:.72rem;color:var(--grey);margin-top:1px}
    .dropdown-item{display:flex;align-items:center;gap:.6rem;padding:.7rem 1.05rem;font-size:.85rem;font-weight:500;color:var(--dark);cursor:pointer;transition:background .15s;text-decoration:none;border:none;background:none;width:100%;font-family:'DM Sans',sans-serif}
    .dropdown-item:hover{background:var(--goldpd);color:var(--navy)}
    .dropdown-item svg{width:15px;height:15px;color:var(--grey)}
    .dropdown-item.danger{color:#ef4444}.dropdown-item.danger:hover{background:#fef2f2}.dropdown-item.danger svg{color:#ef4444}
    .main{max-width:860px;margin:0 auto;padding:2rem 1.5rem 4rem}
    .page-hdr{margin-bottom:1.75rem}
    .page-hdr h1{font-family:'Playfair Display',serif;font-size:1.55rem;color:var(--navy)}
    .page-hdr p{color:var(--grey);font-size:.85rem;margin-top:.3rem}
    @keyframes rot{to{transform:rotate(360deg)}}.rot{animation:rot .8s linear infinite}
    .loading{text-align:center;padding:4rem 1rem;color:var(--grey)}
    .empty{text-align:center;padding:4rem 1rem}
    .empty svg{width:48px;height:48px;margin:0 auto 1rem;display:block;opacity:.2}
    .empty h3{font-family:'Playfair Display',serif;font-size:1.1rem;color:var(--dark);margin-bottom:.4rem}
    .empty p{color:var(--grey);font-size:.88rem}
    .empty a{color:var(--gold);font-weight:600;text-decoration:none}
    .date-group{margin-bottom:1.5rem}
    .date-group-hdr{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
    .date-pill{background:var(--goldp);color:var(--gold);border:1px solid rgba(201,168,76,.2);font-size:.78rem;font-weight:700;padding:5px 14px;border-radius:100px}
    .date-group-count{font-size:.75rem;color:var(--grey)}
    .date-export-btn{margin-left:auto;display:flex;align-items:center;gap:4px;background:#fff;color:var(--navy);border:1.5px solid var(--border);padding:5px 11px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;transition:background .15s}
    .date-export-btn:hover{background:var(--goldp);border-color:var(--gold);color:var(--gold)}
    .date-export-btn svg{width:11px;height:11px}
    .sub-card{background:#fff;border:1.5px solid var(--border);border-radius:14px;margin-bottom:.75rem;overflow:hidden;transition:box-shadow .2s}
    .sub-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08)}
    .sub-hdr{padding:1rem 1.2rem;cursor:pointer;display:flex;align-items:flex-start;gap:.85rem;user-select:none}
    .sub-num{width:32px;height:32px;border-radius:9px;background:var(--goldp);display:flex;align-items:center;justify-content:center;font-family:'Playfair Display',serif;font-size:.9rem;font-weight:700;color:var(--gold);flex-shrink:0;margin-top:1px}
    .sub-meta{flex:1;min-width:0}
    .sub-title{font-weight:700;font-size:.9rem;color:var(--dark)}
    .sub-date-sub{font-size:.73rem;color:var(--grey);margin-top:2px}
    .sub-sec-tags{display:flex;flex-wrap:wrap;gap:.3rem;margin-top:.5rem}
    .sub-sec-tag{font-size:.68rem;font-weight:600;padding:3px 9px;border-radius:100px;background:var(--goldp);color:var(--gold);white-space:nowrap}
    .sub-right{display:flex;align-items:flex-start;gap:.4rem;flex-shrink:0;flex-direction:column;align-items:flex-end}
    .synced-badge{font-size:.68rem;font-weight:700;padding:3px 9px;border-radius:100px;background:var(--goldp);color:var(--gold);white-space:nowrap;border:1px solid rgba(201,168,76,.2)}
    .card-export-btn{display:flex;align-items:center;gap:3px;background:var(--goldp);color:var(--gold);border:none;padding:4px 9px;border-radius:7px;font-family:'DM Sans',sans-serif;font-size:.7rem;font-weight:600;cursor:pointer;transition:background .15s}
    .card-export-btn:hover{background:rgba(201,168,76,.25)}
    .card-export-btn svg{width:11px;height:11px}
    .sub-chevron{color:var(--grey);transition:transform .22s;margin-top:4px}
    .sub-chevron svg{width:17px;height:17px;display:block}
    .sub-body{display:none;border-top:1.5px solid var(--border)}
    .sub-card.open .sub-body{display:block}
    .sub-card.open .sub-chevron{transform:rotate(180deg)}
    .sec-acc{border-bottom:1px solid var(--border)}
    .sec-acc:last-child{border-bottom:none}
    .sec-acc-hdr{display:flex;align-items:center;gap:.65rem;padding:.8rem 1.2rem;cursor:pointer;user-select:none;background:#fff;transition:background .15s}
    .sec-acc-hdr:hover{background:#f9fafb}
    .sec-acc-icon{font-size:.95rem;flex-shrink:0;width:20px;text-align:center}
    .sec-acc-name{font-weight:700;font-size:.84rem;color:var(--dark);flex:1}
    .sec-acc-chevron{color:var(--grey);transition:transform .2s}
    .sec-acc-chevron svg{width:14px;height:14px;display:block}
    .sec-acc.open .sec-acc-hdr{background:var(--goldpd)}
    .sec-acc.open .sec-acc-chevron{transform:rotate(180deg)}
    .sec-acc-body{display:none;padding:.7rem 1.2rem 1rem;background:#fafafa;border-top:1px solid rgba(201,168,76,.1)}
    .sec-acc.open .sec-acc-body{display:block}
    .field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.45rem}
    .field-item{background:#fff;border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem}
    .field-key{font-size:.65rem;color:var(--grey);margin-bottom:2px;text-transform:uppercase;letter-spacing:.03em}
    .field-val{font-size:.83rem;color:var(--dark);font-weight:500;line-height:1.4}
    .field-val.na{color:#c4c9d4;font-style:italic;font-weight:400}
    .toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%);background:var(--navy);color:#fff;padding:10px 18px;border-radius:100px;font-size:.84rem;font-weight:500;white-space:nowrap;opacity:0;transition:opacity .28s;pointer-events:none;z-index:999;display:flex;align-items:center;gap:7px}
    .toast svg{width:14px;height:14px}.toast.show{opacity:1}
    .modal-bg{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.55);align-items:center;justify-content:center;backdrop-filter:blur(4px)}
    .modal-bg.open{display:flex}
    .modal-box{background:#fff;border-radius:18px;padding:2rem 1.75rem;width:90%;max-width:360px;text-align:center;animation:popIn .25s cubic-bezier(.34,1.56,.64,1)}
    @keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
    .modal-icon{font-size:2.2rem;margin-bottom:.75rem}
    .modal-box h3{font-family:'Playfair Display',serif;font-size:1.15rem;color:var(--navy);margin-bottom:.4rem}
    .modal-box p{color:var(--grey);font-size:.88rem;margin-bottom:1.4rem}
    .modal-btns{display:flex;gap:.7rem}
    .mbtn{flex:1;padding:10px;border-radius:10px;border:none;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;cursor:pointer}
    .mbtn.no{background:var(--border);color:var(--dark)}.mbtn.yes{background:#ef4444;color:#fff}
    @media(max-width:640px){.main{padding:1.25rem 1rem 3rem}nav{padding:0 1rem}.field-grid{grid-template-columns:1fr 1fr}}
  </style>
</head>
<body>
<nav>
  <a href="/dashboard.html" class="nav-logo">🌳 <span class="logo-jhs">JHS</span>&nbsp;Tree</a>
  <div class="nav-page-toggle">
    <a href="/dashboard.html" class="nav-page-btn">Home</a>
    <a href="/history.html" class="nav-page-btn active">History</a>
  </div>
  <div class="nav-right">
    <div class="user-menu-wrap" id="umw">
      <button class="user-icon-btn" onclick="toggleUM()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </button>
      <div class="user-dropdown" id="udrop">
        <div class="dropdown-header"><div class="dropdown-name" id="dname">…</div><div class="dropdown-role" id="drole">Field Employee</div></div>
        <button class="dropdown-item danger" onclick="logout()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>Sign out
        </button>
      </div>
    </div>
  </div>
</nav>
<div class="modal-bg" id="m-signout"><div class="modal-box"><div class="modal-icon">👋</div><h3>Sign out?</h3><p>Your history is stored on the server.</p><div class="modal-btns"><button class="mbtn no" onclick="closeM('m-signout')">Stay</button><button class="mbtn yes" onclick="doLogout()">Sign out</button></div></div></div>
<main class="main">
  <div class="page-hdr">
    <h1>Submission History</h1>
    <p>All submitted forms — grouped by date · Expand to view · Export to Excel</p>
  </div>
  <div id="content"><div class="loading"><svg class="rot" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg><p style="margin-top:.75rem">Loading…</p></div></div>
</main>
<div class="toast" id="toast"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg><span id="toast-msg"></span></div>
<script>
const SEC_META={A:{icon:'👤',name:'Respondent Profile'},B:{icon:'🌱',name:'Sapling Survivality'},C:{icon:'🎓',name:'Training & Convergence'},D:{icon:'💰',name:'Outcome & Impact'}};
const F_LABELS={name:'Name',age:'Age',gender:'Gender',mobile:'Mobile',marital:'Marital Status',location:'Location',landsize:'Landholding',landown:'Land Ownership',irrigation:'Irrigation',times_received:'Times Received',sapling_cond:'Sapling Condition',sapling_height:'Sapling Height',sapling_age_yrs:'Sapling Age (yrs)',sapling_suit:'Suitable for Soil',mis_match:'MIS Match',sup_papaya:'Supposed Papaya',sup_mulberry:'Supposed Mulberry',sup_banana:'Supposed Banana',rcv_papaya:'Received Papaya',rcv_mulberry:'Received Mulberry',rcv_banana:'Received Banana',approved_land:'Approved Land',plant_month:'Plant Month',plant_year:'Plant Year',pit_size:'Pit Size',manure:'Manure',surv_papaya:'Surviving Papaya',surv_mulberry:'Surviving Mulberry',surv_banana:'Surviving Banana',watering:'Watering',weeding:'Weeding',training:'Training',train_mmyy:'Training MM/YY',train_location:'Training Location',train_help:'Training Helped',team_visit:'Team Visit',num_visits:'Visits',tech_guidance:'Tech Guidance',know_contact:'Knew Contact',resolved:'Resolved',other_csr:'Other CSR',csr_partner:'CSR Partner',govt_scheme:'Govt Scheme',scheme_name:'Scheme Name',profit_cy:'Profit CY (₹)',profit_ly:'Profit LY (₹)',csr_informed:'CSR Informed',branding:'Branding Seen',satisfaction:'Satisfaction',suggestions:'Suggestions',recommend:'Recommend'};

const user=JSON.parse(localStorage.getItem('user')||'null');
if(!user){window.location.href='/';throw 0;}
document.getElementById('dname').textContent=user.name||'…';
document.getElementById('drole').textContent=user.is_admin?'Admin · Field Employee':'Field Employee';

function fmtDate(s){if(!s)return'—';const[y,m,d]=s.split('-');const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];const dt=new Date(+y,+m-1,+d);return`${days[dt.getDay()]}, ${d} ${months[+m-1]} ${y}`;}
function renderVal(val){if(val===undefined||val===null||val==='')return'<span class="field-val na">—</span>';if(Array.isArray(val))return val.length===0?'<span class="field-val na">None selected</span>':`<span class="field-val">${val.join(', ')}</span>`;return`<span class="field-val">${val}</span>`;}
function buildFieldGrid(secId,data){if(!data)return'<p style="color:var(--grey);font-size:.83rem">No data.</p>';const items=Object.entries(data).map(([k,v])=>{const label=k.startsWith('chk_')?('Multi-select '+(+k.split('_')[1]+1)):(F_LABELS[k]||k.replace(/_/g,' '));return`<div class="field-item"><div class="field-key">${label}</div>${renderVal(v)}</div>`;});return`<div class="field-grid">${items.join('')}</div>`;}
function buildSecAcc(docId,secId,data){const m=SEC_META[secId];if(!m)return'';const id='acc-'+docId+'-'+secId;return`<div class="sec-acc" id="${id}"><div class="sec-acc-hdr" onclick="document.getElementById('${id}').classList.toggle('open')"><span class="sec-acc-icon">${m.icon}</span><span class="sec-acc-name">Tab ${secId}: ${m.name}</span><span class="sec-acc-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></span></div><div class="sec-acc-body">${buildFieldGrid(secId,data)}</div></div>`;}

let allDocs=[];
function buildFormCard(doc,globalIdx){
  const sections=doc.sections||{};const secIds=Object.keys(sections).sort();const name=sections.A?.name||('Form #'+doc.form_number);const loc=sections.A?.location||'';
  const tags=secIds.map(id=>{const m=SEC_META[id];return m?`<span class="sub-sec-tag">${m.icon} ${m.name}`:''}).join('');
  const accs=secIds.map(id=>buildSecAcc(globalIdx,id,sections[id])).join('');
  const cid='card-'+globalIdx;
  return`<div class="sub-card" id="${cid}"><div class="sub-hdr" onclick="toggleCard('${cid}')"><div class="sub-num">${doc.form_number||'?'}</div><div class="sub-meta"><div class="sub-title">${name}${loc?' · '+loc:''}</div><div class="sub-date-sub">${secIds.length}/4 tabs filled</div><div class="sub-sec-tags">${tags}</div></div><div class="sub-right"><span class="synced-badge">✓ Submitted</span><button class="card-export-btn" onclick="event.stopPropagation();exportCard(allDocs[${globalIdx}])"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export</button><span class="sub-chevron"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg></span></div></div><div class="sub-body">${accs}</div></div>`;
}
function toggleCard(cid){const card=document.getElementById(cid);const open=!card.classList.contains('open');card.classList.toggle('open',open);card.querySelector('.sub-body').style.display=open?'block':'none';}
function exportCard(doc){
  const wb=XLSX.utils.book_new();const meta={'Employee':doc.employee_name||user.name||'','Date':doc.date||'','Form #':doc.form_number||1};
  Object.entries(doc.sections||{}).sort().forEach(([secId,data])=>{const m=SEC_META[secId];const row={...meta};Object.entries(data||{}).forEach(([k,v])=>{const label=k.startsWith('chk_')?('Multi-select '+(+k.split('_')[1]+1)):(F_LABELS[k]||k);row[label]=Array.isArray(v)?v.join(', '):(v??'');});XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet([row]),('Tab '+secId+' '+(m?m.name:secId)).slice(0,31));});
  XLSX.writeFile(wb,'JHSTree_'+((doc.employee_name||'Employee').replace(/\s+/g,'_'))+'_'+doc.date+'_Form'+doc.form_number+'.xlsx');toast('Excel exported ✓');
}
function exportDateGroup(date,docs){
  const wb=XLSX.utils.book_new();const secData={};
  docs.forEach(doc=>{const meta={'Employee':doc.employee_name||user.name||'','Date':doc.date||'','Form #':doc.form_number||1};Object.entries(doc.sections||{}).forEach(([secId,data])=>{if(!secData[secId])secData[secId]=[];const row={...meta};Object.entries(data||{}).forEach(([k,v])=>{const label=k.startsWith('chk_')?('Multi-select '+(+k.split('_')[1]+1)):(F_LABELS[k]||k);row[label]=Array.isArray(v)?v.join(', '):(v??'');});secData[secId].push(row);});});
  Object.entries(secData).sort().forEach(([secId,rows])=>{const m=SEC_META[secId];XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),('Tab '+secId+' '+(m?m.name:secId)).slice(0,31));});
  XLSX.writeFile(wb,'JHSTree_'+date+'.xlsx');toast('Exported '+date+' ✓');
}

async function load(){
  const el=document.getElementById('content');const token=localStorage.getItem('access_token');
  if(!navigator.onLine){el.innerHTML=offlineHtml();return;}if(!token){el.innerHTML=emptyHtml();return;}
  try{
    const res=await fetch('/api/submissions',{headers:{'Authorization':'Bearer '+token}});if(!res.ok)throw new Error();
    const docs=await res.json();allDocs=docs;if(!docs.length){el.innerHTML=emptyHtml();return;}
    const byDate={};docs.forEach((doc,i)=>{const date=doc.date||'Unknown';if(!byDate[date])byDate[date]=[];byDate[date].push({doc,globalIdx:i});});
    const dates=Object.keys(byDate).sort().reverse();let html='';
    dates.forEach(date=>{const group=byDate[date];html+=`<div class="date-group"><div class="date-group-hdr"><span class="date-pill">📅 ${fmtDate(date)}</span><span class="date-group-count">${group.length} form${group.length>1?'s':''} submitted</span><button class="date-export-btn" onclick="exportDateGroup('${date}',allDocs.filter(d=>d.date==='${date}'))"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export Day</button></div>${group.map(g=>buildFormCard(g.doc,g.globalIdx)).join('')}</div>`;});
    el.innerHTML=html;
  }catch{el.innerHTML=offlineHtml();}
}
const emptyHtml=()=>`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg><h3>No submissions yet</h3><p>Fill forms on the <a href="/dashboard.html">Home page</a> and submit them.</p></div>`;
const offlineHtml=()=>`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="1" y1="1" x2="23" y2="23"/><path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55M5 12.55a10.94 10.94 0 0 1 5.17-2.39M10.71 5.05A16 16 0 0 1 22.56 9M1.42 9a15.91 15.91 0 0 1 4.7-2.88M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg><h3>You're offline</h3><p>History will appear when back online.</p></div>`;
let toastT=null;
function toast(msg,dur=2800){const t=document.getElementById('toast');document.getElementById('toast-msg').textContent=msg;t.classList.add('show');if(toastT)clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),dur);}
function toggleUM(){document.getElementById('udrop').classList.toggle('open');}
document.addEventListener('click',e=>{const w=document.getElementById('umw');if(w&&!w.contains(e.target))document.getElementById('udrop').classList.remove('open');});
function logout(){document.getElementById('udrop').classList.remove('open');document.getElementById('m-signout').classList.add('open');}
function closeM(id){document.getElementById(id)?.classList.remove('open');}
function doLogout(){['access_token','refresh_token','user'].forEach(k=>localStorage.removeItem(k));window.location.href='/';}
document.getElementById('m-signout').addEventListener('click',e=>{if(e.target.id==='m-signout')closeM('m-signout');});
load();
</script>
