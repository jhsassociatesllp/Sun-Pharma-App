name: 🚀 Build & Deploy

on:
  push:
    branches:
      - main
      - staging

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Set environment
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "ENV=production" >> $GITHUB_ENV
            echo "PORT=9020" >> $GITHUB_ENV
          else
            echo "ENV=staging" >> $GITHUB_ENV
            echo "PORT=9019" >> $GITHUB_ENV
          fi

      - name: Build & Push
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/tree-plantation:$ENV"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Deploy via SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SERVER_KEY }}

      - name: Run on server
        run: |
          IMAGE="ghcr.io/${{ github.repository_owner }}/tree-plantation:$ENV"

          ssh -p "${{ secrets.SERVER_PORT }}" \
            -o StrictHostKeyChecking=no \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" << EOF

              echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

              docker pull "$IMAGE"

              docker stop tree_plantation_$ENV || true
              docker rm tree_plantation_$ENV || true

              docker run -d \
                --name tree_plantation_$ENV \
                -p $PORT:8000 \
                -e MONGO_URL="${{ secrets.MONGO_URL }}" \
                -e DB_NAME="${{ secrets.DB_NAME }}" \
                -e JWT_SECRET="${{ secrets.JWT_SECRET }}" \
                "$IMAGE"

              docker image prune -f --filter "dangling=true"
          EOF